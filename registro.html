<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarme - KatePin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Delius+Swash+Caps&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="registro.css">

  <link rel="icon" type="image/png" href="img/favicon.png?v=2">
</head>
<body class="registro-body">

  <div class="registro-container">
    <div class="registro-card">
      <a href="index.html" class="registro-logo" aria-label="Volver al inicio">
        <img src="img/logo1.png?v=2" alt="KatePin Logo">
      </a>
      
      <h1 class="registro-title">CREAR CUENTA</h1>
      
      <p class="registro-desc">
        Al crear una cuenta, podrás guardar todos los artículos que más te interesen, tener varias direcciones de envío, rastrear sus pedidos y más.
      </p>

      <form class="registro-form" id="registro-form">
        
        <!-- PASO 1 -->
        <div id="step-1">
          <div class="form-group">
            <input type="text" placeholder="Nombre" required>
          </div>
          <div class="form-group">
            <input type="text" placeholder="Apellidos" required>
          </div>
          <div class="form-group">
            <input type="tel" placeholder="Número telefónico" required>
          </div>
          <div class="form-group">
            <input type="text" placeholder="Dirección" required>
          </div>

          <div class="registro-buttons">
            <button type="button" class="btn-continuar" onclick="document.getElementById('step-1').style.display='none'; document.getElementById('step-2').style.display='block';">CONTINUAR</button>
            <button type="button" class="btn-google">GOOGLE <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/></svg></button>
          </div>
        </div>

        <!-- PASO 2 -->
        <div id="step-2" style="display: none;">
          <div class="form-group">
            <input type="email" placeholder="Correo electrónico" required>
          </div>
          <div class="form-group">
            <input type="password" placeholder="Contraseña" required>
          </div>
          <div class="form-group">
            <input type="password" placeholder="Confirmar contraseña" required>
          </div>
          
          <div class="newsletter-check">
            <label>
              <input type="checkbox" checked>
              <span class="custom-radio"></span>
              <i>¡Recibir el boletín de noticias!</i>
            </label>
          </div>

          <div class="registro-buttons">
            <button type="button" class="btn-continuar" onclick="window.location.href='tienda.html'">CREAR CUENTA</button>
            <button type="button" class="btn-google">GOOGLE <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/></svg></button>
          </div>
        </div>

      </form>

      <div class="registro-footer">
        ¿Ya tienes una cuenta? <a href="#">Inicia sesión aquí.</a>
      </div>
    </div>
  </div>

</body>
</html>
